name: Unit Tests

on:
  push:
    branches-ignore:
      - '[0-9]*'
  pull_request:
    branches: [ master, develop ]

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        id: build
        run: |
          docker build -t rdm-wb-test:${{ github.sha }} -f ./Dockerfile .

      - name: Save Docker image
        run: |
          docker save rdm-wb-test:${{ github.sha }} -o /tmp/rdm-wb-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdm-wb-image
          path: /tmp/rdm-wb-image.tar
          retention-days: 1

      - name: Export image reference
        id: meta
        run: echo "image=rdm-wb-test:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  tests:
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      contents: read
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        test_build: [wb]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: rdmcwb-image
          path: /tmp

      - name: Load Docker image
        run: |
          docker load -i /tmp/rdm-wb-image.tar

      - name: Run matrix job
        env:
          TEST_BUILD: ${{ matrix.test_build }}
          WB_TEST_IMAGE: ${{ needs.build-image.outputs.image }}
        run: |
          bash .github/scripts/ci/run-tests.sh "$TEST_BUILD"

